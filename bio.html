<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stanley Andrade</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'DM Sans', sans-serif; }

    .link-card {
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .link-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.09);
    }
    .link-card:active {
      transform: scale(0.98);
    }

    .social-btn {
      transition: transform 0.15s ease, background 0.15s ease;
    }
    .social-btn:hover {
      transform: scale(1.1);
      background: #efefef;
    }
    .social-btn:active {
      transform: scale(0.95);
    }

    /* Animação de entrada */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up {
      opacity: 0;
      animation: fadeUp 0.45s ease forwards;
    }
  </style>
</head>

<body class="bg-[#f5f5f2] min-h-screen flex justify-center px-4 py-14">

  <div class="w-full max-w-[460px] flex flex-col items-center">

    <!-- ── AVATAR ── -->
    <!-- 
      👇 SUBSTITUA o src pela sua foto de perfil.
         Tamanho recomendado: 200×200px, formato quadrado.
         Exemplo: src="./minha-foto.jpg"
    -->
    <!-- <div class="fade-up mb-5" style="animation-delay: 0s;">
      <div class="w-54 h-54 rounded-2xl  overflow-hidden">
        <img
          id="avatar"
          src="./img/eusemfundo.png"
          alt="Foto de perfil de Stanley Andrade"
          class="w-full h-full object-cover"
        />

        <div
          id="avatar-placeholder"
          class="w-full h-full hidden items-center justify-center bg-rose-100 text-rose-400 font-semibold text-2xl"
        >
          UA
        </div>
      </div>
    </div> -->

    <!-- ── NOME E BIO ── -->
    <div class="fade-up text-center mb-7" style="animation-delay: 0.08s;">
      <h1 class="text-[1.2rem] font-semibold text-gray-900 leading-tight mb-0.5">Stanley Andrade</h1>
      <p class="text-sm text-gray-600">Founder: RoutineSoft</p>
    </div>

    <!-- ── LINKS COM IMAGEM ── -->
    <div class="w-full flex flex-col gap-4">

      <!-- ════════════════════════════
           CARD: MENTORIA
           👇 Substitua src="./mentoria.jpg" pela sua imagem do Canva (1920×1080px)
      ═══════════════════════════════ -->
      <a href="https://seulink.com/mentoria" target="_blank" rel="noopener"
        class="link-card fade-up w-full rounded-2xl overflow-hidden shadow-sm block"
        style="animation-delay: 0.24s;">
        <div style="aspect-ratio: 16/9; width: 100%; background: #e5e7eb;">
          <img
            src="./img/card1.png"
            alt="Mentoria"
            style="width:100%; height:100%; object-fit:cover; display:block;"
            onerror="this.parentElement.style.background='#f3f4f6'; this.style.display='none'; this.parentElement.innerHTML+='<div style=\'width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:DM Sans,sans-serif;font-size:14px;color:#9ca3af;\'>mentoria.jpg</div>'"
          />
        </div>
      </a>

      <!-- ════════════════════════════
           CARD: WORKSHOP
           👇 Substitua src="./workshop.jpg" pela sua imagem do Canva (1920×1080px)
      ═══════════════════════════════ -->
      <a href="https://seulink.com/workshop" target="_blank" rel="noopener"
        class="link-card fade-up w-full rounded-2xl overflow-hidden shadow-sm block"
        style="animation-delay: 0.32s;">
        <div style="aspect-ratio: 16/9; width: 100%; background: #e5e7eb;">
          <img
            src="./img/card2.png"
            alt="Workshop de Ações Promocionais"
            style="width:100%; height:100%; object-fit:cover; display:block;"
            onerror="this.parentElement.style.background='#f3f4f6'; this.style.display='none'; this.parentElement.innerHTML+='<div style=\'width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:DM Sans,sans-serif;font-size:14px;color:#9ca3af;\'>workshop.jpg</div>'"
          />
        </div>
      </a>

    </div>

    <!-- ── RODAPÉ ── -->
    <p class="fade-up mt-12 text-xs text-gray-300" style="animation-delay: 0.48s;">feito com ♥</p>

  </div>

  <script>
    // Mostra iniciais "UA" se a foto de perfil não carregar
    const avatar = document.getElementById('avatar');
    const placeholder = document.getElementById('avatar-placeholder');

    avatar.addEventListener('error', () => {
      avatar.style.display = 'none';
      placeholder.style.display = 'flex';
    });
  </script>

</body>
</html>
